name: Tactical Build (PyInstaller)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: TrueGCS-Windows
            extension: .exe
          - os: macos-latest
            artifact_name: TrueGCS-MacOS
            extension: .app
          - os: ubuntu-latest
            artifact_name: TrueGCS-Linux
            extension: .bin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "models;models" --hidden-import=ultralytics --hidden-import=torch --hidden-import=serial --hidden-import=PySide6.QtWebEngineWidgets --hidden-import=PySide6.QtWebEngineCore --name "TrueGCS" main.py

      - name: Build with PyInstaller (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "models:models" --hidden-import=ultralytics --hidden-import=torch --hidden-import=serial --hidden-import=PySide6.QtWebEngineWidgets --hidden-import=PySide6.QtWebEngineCore --name "TrueGCS" main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
