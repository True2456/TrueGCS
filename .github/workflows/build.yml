name: Tactical Build (Nuitka)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            executable: TrueGCS.exe
          - os: macos-latest
            executable: TrueGCS.app
          - os: ubuntu-latest
            executable: TrueGCS.bin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libxkbcommon-dev libdbus-1-3

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Build with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          # Using default stable version instead of main
          script-name: main.py
          standalone: true
          onefile: true
          enable-plugins: pyside6
          windows-disable-console: true
          macos-create-app-bundle: true
          # Explicitly include the encrypted models and custom logic packages
          include-data-dir: models=models
          include-package: |
            ui
            video
            telemetry
            core
            gimbal
          output-dir: build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueGCS-${{ matrix.os }}
          path: |
            build/*.exe
            build/*.app
            build/*.bin
            build/*.dist
