name: Tactical Build (Windows-Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller cython

      - name: Cythonize Core Logic (Security Lockdown)
        run: |
          python setup.py build_ext --inplace
          # Remove original .py files to ensure PyInstaller uses the compiled binaries
          python -c "import os; [os.remove(os.path.join(d, f)) for d in ['core', 'telemetry'] for f in os.listdir(d) if f.endswith('.py') and f != '__init__.py']"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "models;models" --hidden-import=ultralytics --hidden-import=torch --hidden-import=serial --hidden-import=pymavlink --hidden-import=pymavlink.mavutil --hidden-import=cryptography --hidden-import=cryptography.fernet --hidden-import=cryptography.hazmat.primitives.kdf.pbkdf2 --hidden-import=cryptography.hazmat.backends --hidden-import=cryptography.hazmat.primitives.hashes --hidden-import=requests --hidden-import=bleak --hidden-import=cv2 --hidden-import=PySide6.QtWebEngineWidgets --hidden-import=PySide6.QtWebEngineCore --name "TrueGCS" main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueGCS-Windows-Latest
          path: dist/
